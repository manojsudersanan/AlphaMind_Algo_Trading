name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Compose
        run: docker-compose build
      - name: Start services
        run: docker-compose up -d
      - name: Run Backend Tests
        run: make test-be
      - name: Run Frontend Tests
        run: make test-fe
