version: '3.8'

services:
  frontend:
    build:
      target: runner
    ports:
      - "80:3000"
    volumes: []
    environment:
      - NODE_ENV=production

  backend:
    build:
      target: runner
    volumes: []
    environment:
      - APP_ENV=production

  ai_engine:
    build:
      target: base
    volumes: []
    environment:
      - APP_ENV=production
